name: Deploy to ECS (staging)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: grand-health-staging
  ECS_CLUSTER: grand-health-staging
  ECS_SERVICE: grand-health-staging-web
  ECS_TASK_FAMILY: grand-health-staging-web
  CONTAINER_NAME: web
  DEPLOY_ROLE_ARN: arn:aws:iam::669960694177:role/grand-health-staging-gh-deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE_URI="$REGISTRY/$ECR_REPOSITORY"
          docker build \
            --build-arg NEXT_PUBLIC_AWS_REGION=us-east-1 \
            --build-arg NEXT_PUBLIC_COGNITO_USER_POOL_ID=us-east-1_Yk5gVyw4D \
            --build-arg NEXT_PUBLIC_COGNITO_CLIENT_ID=n9pkk4kb0doa5hhspsv510ecq \
            --build-arg NEXT_PUBLIC_SITE_URL=http://GrandH-AppRu-fGEmWB5254DN-1041571929.us-east-1.elb.amazonaws.com \
            -t "$IMAGE_URI:${{ github.sha }}" -t "$IMAGE_URI:latest" .
          docker push "$IMAGE_URI:${{ github.sha }}"
          docker push "$IMAGE_URI:latest"
          echo "image=$IMAGE_URI:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Check whether ECS service exists
        id: svc
        run: |
          STATUS=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query 'services[0].status' --output text 2>/dev/null || echo "NONE")
          if [ "$STATUS" = "ACTIVE" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "ECS service not found yet (status=$STATUS). Image is pushed; run the Phase-2 CDK deploy to create the service, then re-run this workflow."
          fi

      - name: Download current task definition
        if: steps.svc.outputs.exists == 'true'
        run: |
          aws ecs describe-task-definition \
            --task-definition "$ECS_TASK_FAMILY" \
            --query 'taskDefinition' --output json > task-def.json

      - name: Render new image into task definition
        if: steps.svc.outputs.exists == 'true'
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build.outputs.image }}

      - name: Deploy to ECS
        if: steps.svc.outputs.exists == 'true'
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
